name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_os: Linux
            asset_arch: x86_64
          - goos: linux
            goarch: arm64
            asset_os: Linux
            asset_arch: aarch64
          - goos: darwin
            goarch: amd64
            asset_os: Darwin
            asset_arch: x86_64
          - goos: darwin
            goarch: arm64
            asset_os: Darwin
            asset_arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_OS: ${{ matrix.asset_os }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -eu
          mkdir -p dist
          binary="incus-apply-${ASSET_OS}-${ASSET_ARCH}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${date}" \
            -o "dist/${binary}" \
            ./cmd/incus-apply
          (cd dist && shasum -a 256 "${binary}" > "${binary}.sha256")

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: |
            dist/incus-apply-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
            dist/incus-apply-${{ matrix.asset_os }}-${{ matrix.asset_arch }}.sha256
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/incus-apply-Linux-x86_64
            dist/incus-apply-Linux-x86_64.sha256
            dist/incus-apply-Linux-aarch64
            dist/incus-apply-Linux-aarch64.sha256
            dist/incus-apply-Darwin-x86_64
            dist/incus-apply-Darwin-x86_64.sha256
            dist/incus-apply-Darwin-arm64
            dist/incus-apply-Darwin-arm64.sha256
